    <style type="text/tailwindcss">
    @tailwind base;
    @tailwind components;
    @tailwind utilities;

    @layer base {
        :root {
            --primary: #1e3a8a; /* Deep Blue */
            --secondary: #d97706; /* Golden Amber */
            --bg-color: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #475569;
        }
        body {
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            background-color: var(--bg-color);
        }
        h1, h2, h3 {
            font-family: 'Playfair Display', serif;
        }
    }

    @layer components {
        .section-padding {
            @apply py-16 md:py-24;
        }
        .container-custom {
            @apply max-w-7xl mx-auto px-4 sm:px-6 lg:px-8;
        }
        .btn-primary {
            @apply inline-flex items-center justify-center px-6 py-3 border border-transparent text-base font-medium rounded-md text-white bg-[var(--primary)] hover:bg-blue-900 transition-colors duration-300;
        }
        .btn-secondary {
            @apply inline-flex items-center justify-center px-6 py-3 border border-transparent text-base font-medium rounded-md text-white bg-[var(--secondary)] hover:bg-amber-700 transition-colors duration-300;
        }
        .card {
            @apply bg-white rounded-xl shadow-sm border border-gray-100 hover:shadow-md transition-shadow duration-300 overflow-hidden;
        }
    }
    </style>
</head>

</body>
